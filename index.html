<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Station</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <img id="logo" src="YOUR_LOGO_URL" alt="Logo" />
      <p>
        ဂရင်းကျေးလက်မြို့: က.ရ.ဆ(တိုင်)ထပ်မှတ်မှတ်တိုင်အပေါ်:<br />
        <span>09-8762005</span>
      </p>
    </header>

    <main>
      <h2>⛽ Daily Fuel Rates 📅</h2>
      <div class="rates">
        <div class="rate" id="diesel">Loading...</div>
        <div class="rate" id="octane92">Loading...</div>
        <div class="rate" id="premiumDiesel">Loading...</div>
        <div class="rate" id="octane95">Loading...</div>
      </div>
    </main>
    <footer>
      <p>Effective on February 14, 2025</p>
      <p>Rates shown are indicative only and subject to change without notice.</p>
    </footer>
  </div>

  <script>
    fetch("https://raw.githubusercontent.com/audiobar/fuel-station/refs/heads/main/fuel-prices.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Network response was not ok");
        }
        return response.json();
      })
      .then((data) => {
        document.querySelector("#diesel").innerText = `Diesel: ${data.diesel} MMK`;
        document.querySelector("#octane92").innerText = `Octane 92: ${data.octane92} MMK`;
        document.querySelector("#premiumDiesel").innerText = `Premium Diesel: ${data.premiumDiesel} MMK`;
        document.querySelector("#octane95").innerText = `Octane 95: ${data.octane95} MMK`;
      })
      .catch((error) => {
        console.error("Error fetching JSON:", error);
        document.querySelectorAll(".rate").forEach((el) => {
          el.innerText = "Failed to Load";
        });
      });
  </script>
</body>
</html>
