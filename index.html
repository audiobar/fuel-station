<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL Oil Filling Station</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

    <div class="container">
        <img class="logo" src="https://api.pcloud.com/getpubthumb?code=XZVDqH5ZB7XHlNvUgvh1zOGIo0Iqy4hunm3y&linkpassword=undefined&size=1912x980&crop=0&type=auto" alt="NL Oil Logo">
        <p>မြန်မာ့ရေကြောင်းလမ်းမကြီး | က.ရ.ခ(တိုက်)ထိပ်<br>မြို့ပြမြင် | တန်ဖိုးရှိသောဆီအရောင်း</p>
        <p><span class="phone-icon">📞</span> <b>Hotline:</b> 09-8762005</p>

        <h3 class="date-time">📅 Date: <span id="current-date">Loading...</span></h3>
        <h3 class="date-time">⏰ Time: <span id="current-time">Loading...</span></h3>

        <h2 class="fuel-title">⛽ Today’s Fuel Rates 📆</h2>

        <div class="fuel-box">
            <h3 class="fuel-name">Diesel</h3>
            <p class="fuel-price" id="diesel-price">Loading...</p>
        </div>

        <div class="fuel-box">
            <h3 class="fuel-name">Octane 92</h3>
            <p class="fuel-price" id="octane92-price">Loading...</p>
        </div>

        <div class="fuel-box">
            <h3 class="fuel-name">Premium Diesel</h3>
            <p class="fuel-price" id="premium-diesel-price">Loading...</p>
        </div>

        <div class="fuel-box">
            <h3 class="fuel-name">Octane 95</h3>
            <p class="fuel-price" id="octane95-price">Loading...</p>
        </div>
    </div>

</body>
</html>
